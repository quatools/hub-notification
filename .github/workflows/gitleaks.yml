name: gitleaks

# Filet de sécurité : détecte toute fuite de secret à chaque push / PR.
# Utilise la configuration .gitleaks.toml à la racine (faux positifs écartés).

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:   # lançable manuellement depuis l'onglet Actions

jobs:
  scan:
    name: Scan des secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (historique complet)
        uses: actions/checkout@v4
        with:
          # Profondeur 0 = tout l'historique, pour scanner aussi les anciens commits.
          fetch-depth: 0

      - name: gitleaks (binaire open-source, sans licence)
        # L'action gitleaks-action@v2 est devenue payante pour les organisations.
        # On utilise le binaire open-source (MIT), gratuit et sans licence.
        run: |
          VER=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gl.tgz
          tar -xzf gl.tgz gitleaks
          ./gitleaks detect --source . --redact --no-banner --config .gitleaks.toml --exit-code 1
